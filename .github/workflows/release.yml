name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          NAME="baidupcs-server-${{ github.ref_name }}-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o "${NAME}" .
          zip "${NAME}.zip" "${NAME}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.zip"
          draft: false
          prerelease: false
